name: CI

# Run on every push and every pull-request, across all branches.
on:
  push:
  pull_request:

jobs:

  # ---------------------------------------------------------------------------
  # Universal tests — no GPU required.
  # Covers enum values, pixel format utilities, and descriptor construction.
  # Runs on macOS, Linux, and Windows using the platform's native toolchain.
  # ---------------------------------------------------------------------------
  universal-tests:
    name: Universal tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            name: macOS Intel (x86_64)
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux
          - os: ubuntu-24.04-arm
            name: Linux arm64 — PulseAudio
          - os: windows-latest
            name: Windows
          - os: windows-11-arm
            name: Windows arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y libvulkan-dev

      - name: Configure
        run: cmake -B build -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --target campello_gpu_universal_tests

      - name: Test
        run: ctest --test-dir build --output-on-failure -R campello_gpu_universal_tests

  # ---------------------------------------------------------------------------
  # Metal integration tests — macOS only.
  # GitHub-hosted macOS runners are real Apple hardware with a GPU, so Metal
  # is available and integration tests can run end-to-end.
  # ---------------------------------------------------------------------------
  metal-integration:
    name: Metal integration tests (macOS)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -B build -DBUILD_INTEGRATION_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # iOS build check — compile the Metal backend for the iOS simulator.
  # No tests are executed: there is no test runner without a connected device
  # or a fully configured simulator environment.
  # Code signing is disabled so the check works on any runner without a cert.
  # ---------------------------------------------------------------------------
  build-ios:
    name: Build check (iOS / Metal)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Configure (iOS simulator)
        run: |
          cmake -B build \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY=""

      - name: Build
        run: cmake --build build --config Release

  # ---------------------------------------------------------------------------
  # Android build check — cross-compile the Vulkan backend with the NDK for
  # all four supported ABIs: 64-bit (arm64-v8a, x86_64) and 32-bit
  # (armeabi-v7a, x86). No tests are executed: running on-device tests
  # requires a connected device or a Vulkan-capable emulator.
  # ---------------------------------------------------------------------------
  build-android:
    name: Build check (Android / ${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]

    steps:
      - uses: actions/checkout@v6

      - name: Configure (${{ matrix.abi }}, API 28)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

  # ---------------------------------------------------------------------------
  # Windows build check — compile the DirectX 12 backend.
  # No tests are executed: GPU integration tests require a DX12-capable device
  # which is not available on standard GitHub-hosted Windows runners.
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build check (Windows / DirectX 12)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release
