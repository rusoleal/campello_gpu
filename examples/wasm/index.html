<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>campello_gpu — WebGPU Example</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            width: 800px;
            height: 600px;
            image-rendering: pixelated;
        }
        #loading {
            position: absolute;
            color: #fff;
            font-family: sans-serif;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="loading">Loading WebGPU...</div>
    <canvas id="canvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const loading = document.getElementById('loading');

        if (!navigator.gpu) {
            loading.textContent = 'WebGPU is not supported in this browser.';
        } else {
            loading.style.display = 'none';
        }
    </script>
    {{{ SCRIPT }}}
</body>
</html>
